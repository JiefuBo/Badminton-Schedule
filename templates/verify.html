<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>密钥验证</title>
</head>
<body>
    <h2>请上传密钥文件并输入授权信息</h2>
    <form method="post" enctype="multipart/form-data">
        授权信息：<input type="text" name="auth_info" required><br>
        密钥文件：<input type="file" name="keyfile" accept=".txt" required><br>
        <button type="submit">验证</button>
    </form>
    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {% endif %}
</body>
</html>
